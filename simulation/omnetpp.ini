[General]
network = simulations.ned.SatelliteNetwork
sim-time-limit = 300s

###################################
# BASIC CONFIG
###################################

*.numSatellites = 10
*.numGroundStations = 20

###################################
# APPLICATION (QUIC TRAFFIC)
###################################

# Client
*.groundStation[0].app[0].typename = "QuicClientApp"
*.groundStation[0].app[0].destAddress = "groundStation[19]"
*.groundStation[0].app[0].packetInterval = 0.05s
*.groundStation[0].app[0].messageLength = 1024B

# Server
*.groundStation[19].app[0].typename = "QuicServerApp"

###################################
# UDP / NETWORK
###################################

*.**.udp.typename = "Udp"

###################################
# LEO DELAY MODEL
###################################

*.leoDelay = uniform(0.02s, 0.15s)

###################################
# HANDOVER (SIMULATION)
###################################

*.handoverInterval = uniform(300s, 600s)

###################################
# RECORDING
###################################

output-scalar-file = results/scalar.sca
output-vector-file = results/vector.vec
