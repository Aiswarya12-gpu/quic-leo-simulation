[General]
network = satquic.SatQuicNet
sim-time-limit = 200s

# ----------------------------
# QUIC CLIENT (gs[0])
# ----------------------------
*.gs[0].numApps = 1
*.gs[0].app[0].typename = "QuicClient"
*.gs[0].app[0].connectAddress = "gs[19]"
*.gs[0].app[0].connectPort = 5000
*.gs[0].app[0].localPort = 4000
*.gs[0].app[0].startTime = 1s

# ----------------------------
# QUIC SERVER (gs[19])
# ----------------------------
*.gs[19].numApps = 1
*.gs[19].app[0].typename = "QuicDiscardServer"
*.gs[19].app[0].localPort = 5000

# ----------------------------
# ROUTING
# ----------------------------
*.configurator.addStaticRoutes = true
*.configurator.addDefaultRoutes = true

*.sat[*].ipv4.forward = true
*.gs[*].ipv4.forward = true

# ----------------------------
# DEBUG (for visualization)
# ----------------------------
**.interfaceTable.displayAddresses = true
**.routingTable.displayRoutingTables = true
